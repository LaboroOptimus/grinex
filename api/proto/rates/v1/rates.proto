syntax = "proto3";

package rates.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/LaboroOptimus/grinex/api/proto/rates/v1;ratesv1";

service RatesService {
  rpc GetRates(GetRatesRequest) returns (GetRatesResponse);
  rpc Healthcheck(HealthcheckRequest) returns (HealthcheckResponse);
}

enum CalculationMethod {
  CALCULATION_METHOD_UNSPECIFIED = 0;
  CALCULATION_METHOD_TOP_N = 1;
  CALCULATION_METHOD_AVG_N_M = 2;
}

message GetRatesRequest {
  CalculationMethod method = 1;
  uint32 n = 2;
  uint32 m = 3;
}

message GetRatesResponse {
  double ask = 1;
  double bid = 2;
  google.protobuf.Timestamp received_at = 3;
}

message HealthcheckRequest {}

message HealthcheckResponse {
  string status = 1;
  google.protobuf.Timestamp checked_at = 2;
}
